---
dependency:
  name: galaxy
driver:
  name: ec2
platforms:
  - name: kafkaansiblemoleculenode
    image: ""
    image_name: "debian-13-amd64-*"
    image_owner:
      - "136693071363"
    instance_type: t3.small
    ssh_user: admin
    assign_public_ip: true
    region: eu-west-1
    tags:
      Name: kafkaansiblemoleculenode
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    host_vars:
      kafkaansiblemoleculenode:
        kafka_node_id: 1
        kafka_install_dependencies: true
verifier:
  name: ansible
