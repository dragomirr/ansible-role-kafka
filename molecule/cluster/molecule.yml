---
dependency:
  name: galaxy
driver:
  name: ec2
platforms:
  - name: kafkaansiblemoleculenode1
    image: ""
    image_name: "debian-13-amd64-*"
    image_owner:
      - "136693071363"
    instance_type: t3.small
    ssh_user: admin
    assign_public_ip: true
    region: eu-west-1
    tags:
      Name: kafkaansiblemoleculenode1
  - name: kafkaansiblemoleculenode2
    image: ""
    image_name: "debian-13-amd64-*"
    image_owner:
      - "136693071363"
    instance_type: t3.small
    ssh_user: admin
    assign_public_ip: true
    region: eu-west-1
    tags:
      Name: kafkaansiblemoleculenode2
  - name: kafkaansiblemoleculenode3
    image: ""
    image_name: "debian-13-amd64-*"
    image_owner:
      - "136693071363"
    instance_type: t3.small
    ssh_user: admin
    assign_public_ip: true
    region: eu-west-1
    tags:
      Name: kafkaansiblemoleculenode3
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    host_vars:
      kafkaansiblemoleculenode1:
        kafka_node_id: 1
      kafkaansiblemoleculenode2:
        kafka_node_id: 2
      kafkaansiblemoleculenode3:
        kafka_node_id: 3
    group_vars:
      all:
        kafka_install_dependencies: true
verifier:
  name: ansible
